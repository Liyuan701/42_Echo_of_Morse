# Routage WebSocket — Socket.IO passe par le WAF avant d'atteindre ws-server.
#
# Sans ce bloc, le WAF envoie TOUT le trafic vers web:3000 via la variable BACKEND.
# Next.js ne gère pas les connexions WebSocket, donc elles échoueraient silencieusement.
#
# nginx lit ce fichier automatiquement via : include /etc/nginx/conf.d/*.conf
# Ce fichier est monté dans le conteneur WAF via le volume défini dans docker-compose.yml.
#
# Priorité : location /socket.io/ est plus spécifique que location /,
# donc nginx l'applique en premier pour toute requête WebSocket.

location /socket.io/ {
    # proxy_pass se termine par / — nginx remplace le préfixe /socket.io/ par /
    # Évite le double path /socket.io/socket.io/ que socket.io-client génère.
    proxy_pass http://ws:3001/;

    # HTTP/1.1 obligatoire — HTTP/1.0 ne supporte pas l'upgrade de protocole.
    proxy_http_version 1.1;

    # Ces deux headers déclenchent le changement HTTP → WebSocket.
    # Sans eux, le serveur refuse la connexion WebSocket.
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Transmet l'hôte et l'IP réelle du client au ws-server.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    # Empêche nginx de cacher les connexions WebSocket.
    proxy_cache_bypass $http_upgrade;

    # Par défaut nginx ferme la connexion après 60s d'inactivité.
    # 86400s = 24h — nécessaire pour maintenir les connexions WebSocket ouvertes.
    proxy_read_timeout 86400;
}
