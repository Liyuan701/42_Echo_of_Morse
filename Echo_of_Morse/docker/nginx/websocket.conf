# Routage WebSocket — Socket.IO passe par le WAF avant d'atteindre ws-server.
#
# Sans ce bloc, le WAF envoie TOUT le trafic vers web:3000 via la variable BACKEND.
# Next.js ne gère pas les connexions WebSocket, donc elles échoueraient silencieusement.
#
# nginx lit ce fichier automatiquement via : include /etc/nginx/conf.d/*.conf
# Ce fichier est monté dans le conteneur WAF via le volume défini dans docker-compose.yml.
#
# Priorité : location /socket.io/ est plus spécifique que location /,
# donc nginx l'applique en premier pour toute requête WebSocket.

location /socket.io/ {
    proxy_pass http://ws:3001/socket.io/;

    # Ces trois headers sont obligatoires pour le changement de protocole HTTP → WebSocket.
    # Sans Upgrade et Connection, le serveur refuse la connexion WebSocket.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Transmet l'IP réelle du client au ws-server (utile pour les logs de sécurité).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
